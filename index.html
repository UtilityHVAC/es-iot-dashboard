<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ES IOT Dashboard</title>
  <style>
    body { 
      font-family: Arial; 
      margin:0; 
      background:linear-gradient(135deg,#74ebd5,#ACB6E5); 
      display:flex; 
      flex-direction:column; 
      min-height:100vh; 
    }
    header, footer { 
      background:#333; 
      color:white; 
      text-align:center; 
      padding:15px; 
    }
    header { 
      font-size:24px; 
      font-weight:bold; 
      letter-spacing:2px; 
    }
    footer { 
      font-size:14px; 
    }
    main { 
      flex:1; 
      display:flex; 
      flex-direction:column; 
      justify-content:center; 
      align-items:center; 
    }
    .switch { 
      position:relative; 
      display:inline-block; 
      width:80px;
      height:40px; 
      margin:20px; 
    }
    .switch input { 
      display:none; 
    }
    .slider { 
      position:absolute; 
      cursor:pointer; 
      top:0; 
      left:0; 
      right:0; 
      bottom:0; 
      background:#ccc; 
      transition:.4s; 
      border-radius:40px; 
    }
    .slider:before { 
      position:absolute; 
      content:""; 
      height:32px; 
      width:32px; 
      left:4px; 
      bottom:4px; 
      background:white; 
      transition:.4s; 
      border-radius:50%; 
    }
    input:checked + .slider { 
      background:#4CAF50; 
    }
    input:checked + .slider:before { 
      transform:translateX(40px); 
    }
    #status { 
      font-size:18px; 
      margin-top:10px; 
      color:#333; 
    }
    #identityLabel { 
      font-size:16px; 
      margin-top:10px; 
      color:#222; 
      font-weight:bold; 
    }
  </style>
</head>
<body>
  <header>ES IOT</header>
  <main>
    <label class="switch">
      <input type="checkbox" id="relaySwitch" onclick="toggleRelay()">
      <span class="slider"></span>
    </label>
    <p id="status">Status: Unknown</p>

    <!-- Input identitas -->
    <input type="text" id="identityInput" placeholder="Masukkan identitas tombol">
    <button onclick="saveIdentity()">Simpan</button>
    <p id="identityLabel"></p>
  </main>
  <footer>&copy; 2026 ES IOT Dashboard</footer>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

    client.on("connect", () => {
      client.subscribe("es_iot/status");
      client.subscribe("es_iot/identity");
    });

    function toggleRelay() {
      const checked = document.getElementById("relaySwitch").checked;
      client.publish("es_iot/control", checked ? "ON" : "OFF");
    }

    client.on("message", (topic, message) => {
      if (topic === "es_iot/status") {
        const status = message.toString();
        document.getElementById("status").innerText = "Status: " + status;
        document.getElementById("relaySwitch").checked = (status === "Relay ON");
      }
      if (topic === "es_iot/identity") {
        const identity = message.toString();
        document.getElementById("identityLabel").innerText = "Identitas: " + identity;
        localStorage.setItem("relayIdentity", identity);
      }
    });

    // Load identitas dari localStorage saat halaman dibuka
    window.onload = () => {
      const savedIdentity = localStorage.getItem("relayIdentity");
      if (savedIdentity) {
        document.getElementById("identityLabel").innerText = "Identitas: " + savedIdentity;
        document.getElementById("identityInput").value = savedIdentity;
      }
    };

    function saveIdentity() {
      const identity = document.getElementById("identityInput").value;
      client.publish("es_iot/identity", identity);
      localStorage.setItem("relayIdentity", identity);
      document.getElementById("identityLabel").innerText = "Identitas: " + identity;
    }
  </script>
</body>
</html>
